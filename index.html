<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./Assets/css/index.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <title>ChegaBus</title>
</head>

<body>
    <div class="splash">
        <img src="./Assets/images/Logo.png" alt="Logo" width="256px" height="318px">
    </div>

    <div class="screenpage-one d-flex align-items-center justify-content-center min-vh-100 bg-white">
        <div class="text-center">
            <div class="mb-4">
                <img src="./Assets/images/MeninaViajar.png" alt="Menina Viajando" class="img-fluid"
                    style="max-width: 600px; height: auto;">
            </div>
            <h1 class="h3 font-weight-bold text-dark">
                Viaje o mundo
            </h1>
            <h2 class="h3 font-weight-bold text-dark">
                facilmente
            </h2>
            <p class="text-muted">
                para aonde quiser
            </p>
            <div class="d-flex justify-content-center align-items-center mt-4">
                <div class="d-flex justify-content-center align-items-center mr-3">
                    <div class="dot bg-primary mr-2"></div>
                    <div class="dot bg-light"></div>
                </div>
                <button class="btn btn-dark rounded-circle" id="next-slide-one">
                    <i data-feather="chevron-right"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="screenpage-two d-flex align-items-center justify-content-center min-vh-100 bg-white">
        <div class="text-center">
            <div class="mb-4">
                <img src="./Assets/images/GrupoDePessoas.png" alt="Grupo de Pessoas Viajando" class="img-fluid"
                    style="max-width: 600px; height: auto;">
            </div>
            <h1 class="h3 font-weight-bold text-dark">
                De maneira que
            </h1>
            <h2 class="h3 font-weight-bold text-dark">
                você quiser
            </h2>
            <p class="text-muted">
                até ao seu destino
            </p>
            <div class="d-flex justify-content-center align-items-center mt-4">
                <div class="d-flex justify-content-center align-items-center mr-3">
                    <div class="dot bg-light mr-2"></div>
                    <div class="dot bg-primary"></div>
                </div>
                <button class="btn btn-dark rounded-circle" id="next-slide-two">
                    <a href="./Assets/Pages/login.html"> </a>
                    <i data-feather="chevron-right"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="./Assets/js/splashscreen.js"></script>
    <script>
        feather.replace();
    </script>
</body>

</html>
