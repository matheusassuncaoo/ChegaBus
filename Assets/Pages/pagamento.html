<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
    <div class="d-flex min-vh-100">
        <!-- Sidebar -->
        <div class="bg-light p-4" style="width: 250px;">
            <div class="text-center mb-5">
                <a href="/Assets/Pages/dashboard.html">
                    <img alt="ChegaBus Logo" class="mb-3" src="/Assets/images/Logo_Blue.png" style="width: 64px; height: 80px;"/>
                </a>
            </div>
            <nav class="nav flex-column">
                <a class="nav-link text-dark mb-3" href="/Assets/Pages/dashboard.html">
                    <i data-feather="home" class="me-2"></i>
                    Dashboard
                </a>
                <a class="nav-link text-dark mb-3" href="/Assets/Pages/passagens.html">
                    <i data-feather="arrow-right" class="me-2"></i>
                    Tickets
                </a>
                <a class="nav-link text-dark mb-3" href="#">
                    <i data-feather="user" class="me-2"></i>
                    Perfil
                </a>
                <a class="nav-link text-dark mb-3" href="#">
                    <i data-feather="lock" class="me-2"></i>
                    Entrar
                </a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-grow-1 p-5 bg-white">
            <!-- Etapas -->
            <ul class="nav nav-tabs mb-4" id="pagamentoTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="identificacao-tab" data-bs-toggle="tab" data-bs-target="#identificacao" type="button" role="tab" aria-controls="identificacao" aria-selected="true">Etapa 1: Identificação</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="dados-boleto-tab" data-bs-toggle="tab" data-bs-target="#dados-boleto" type="button" role="tab" aria-controls="dados-boleto" aria-selected="false">Etapa 2: Dados do Boleto</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="pagamento-tab" data-bs-toggle="tab" data-bs-target="#pagamento" type="button" role="tab" aria-controls="pagamento" aria-selected="false">Etapa 3: Pagamento</button>
                </li>
            </ul>

            <!-- Conteúdo das Etapas -->
            <div class="tab-content" id="pagamentoTabContent">
                <!-- Etapa 1: Identificação -->
                <div class="tab-pane fade show active" id="identificacao" role="tabpanel" aria-labelledby="identificacao-tab">
                    <h2 class="h4 mb-4">Como podemos te chamar?</h2>
                    <form id="form-identificacao">
                        <div class="mb-3">
                            <input type="text" class="form-control" id="nome" placeholder="Nome e sobrenome" required>
                        </div>
                        <button type="submit" class="btn btn-primary px-5">Continuar</button>
                    </form>
                    <a href="/Assets/Pages/passagens.html" class="text-muted mt-3 d-block">← Voltar</a>
                </div>

                <!-- Etapa 2: Dados do Boleto -->
                <div class="tab-pane fade" id="dados-boleto" role="tabpanel" aria-labelledby="dados-boleto-tab">
                    <h2 class="h4 mb-4">Como falamos com você?</h2>
                    <form id="form-dados-boleto">
                        <div class="mb-3">
                            <input type="text" class="form-control" id="celular" placeholder="Celular com DDD" required>
                        </div>
                        <button type="submit" class="btn btn-primary px-5">Continuar</button>
                    </form>
                    <a href="#" class="text-muted mt-3 d-block voltar-identificacao">← Voltar</a>
                </div>

                <!-- Etapa 3: Pagamento -->
                <div class="tab-pane fade" id="pagamento" role="tabpanel" aria-labelledby="pagamento-tab">
                    <h2 class="h4 mb-4">Esqueceu o código de barras do boleto, para o leitor abaixo.</h2>
                    <form id="form-pagamento">
                        <div class="mb-3">
                            <input type="text" class="form-control" id="cpf" placeholder="CPF com 11 dígitos" required>
                        </div>
                        <button type="submit" class="btn btn-primary px-5">Continuar</button>
                    </form>
                    <a href="#" class="text-muted mt-3 d-block voltar-dados-boleto">← Voltar</a>
                    <a href="#" class="text-muted mt-2 d-block">Digitalizar linha digitável</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!-- Feather Icons Initialization -->
    <script>
        feather.replace();
    </script>
    <script src="/Assets/js/pagamento.js"></script>
</body>
</html>
