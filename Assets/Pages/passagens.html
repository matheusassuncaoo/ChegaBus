<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passagens</title>
    <link rel="stylesheet" href="/Assets/css/dashboard.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>
</head>

<body>
    <div class="d-flex min-vh-100">
        <!-- Sidebar -->
        <div class="bg-light p-4" style="width: 250px;">
            <div class="text-center mb-5">
                <a href="/Assets/Pages/dashboard.html">
                    <img alt="ChegaBus Logo" class="mb-3" src="..//images/Logo_Blue.png"
                        style="width: 64px; height: 80px;" />
                </a>
            </div>
            <nav class="nav flex-column">
                <a class="nav-link text-dark mb-3" href="./dashboard.html">
                    <i data-feather="home" class="me-2"></i>
                    Dashboard
                </a>
                <a class="nav-link text-dark mb-3 active" href="./passagens.html">
                    <i data-feather="arrow-right" class="me-2"></i>
                    Tickets
                </a>
                <a class="nav-link text-dark mb-3" href="#">
                    <i data-feather="user" class="me-2"></i>
                    Perfil
                </a>
                <a class="nav-link text-dark mb-3" href="#">
                    <i data-feather="lock" class="me-2"></i>
                    Entrar
                </a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-grow-1 p-5 bg-white">
            <!-- Search Form -->
            <div class="card p-4 mb-5 shadow-sm">
                <form>
                    <div class="row g-3 align-items-center">
                        <div class="col-md-3">
                            <div class="input-group">
                                <span class="input-group-text"><i data-feather="map-pin"></i></span>
                                <input type="text" id="pontoPartida" class="form-control bg-light"
                                    placeholder="Ponto de Partida">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="input-group">
                                <span class="input-group-text"><i data-feather="map-pin"></i></span>
                                <input type="text" id="pontoChegada" class="form-control bg-light"
                                    placeholder="Ponto de Chegada">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="input-group">
                                <span class="input-group-text"><i data-feather="calendar"></i></span>
                                <input type="date" id="dataViagem" class="form-control bg-light" value="2025-03-15">
                            </div>
                        </div>
                        <div class="col-md-3 text-end">
                            <button type="submit" class="btn btn-primary px-5">Buscar Ônibus</button>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Ticket Listings -->
            <div id="ticket-listings" class="row row-cols-1 row-cols-md-3 g-4">

            </div>
        </div>
    </div>

    <!-- Bootstrap JS and Feather Icons Initialization -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script>
        feather.replace(); // Initialize Feather Icons
    </script>
    <script src="/Assets/js/passagens.js"></script>
</body>

</html>
