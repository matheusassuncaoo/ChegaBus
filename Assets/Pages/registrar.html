<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChegaBus - Registro</title>
    <link rel="stylesheet" href="../css/global.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>
</head>

<body class="d-flex align-items-center justify-content-center bg-light min-vh-100">
    <div class="card shadow p-4 w-100" style="max-width: 400px;">
        <div class="text-center mb-4">
            <img src="../images/Logo_Blue.png" alt="ChegaBus Logo" width="64" height="80" class="mb-3">
            <h4 class="mb-2">Novo por aqui?</h4>
            <p class="text-muted">Queremos te conhecer melhor</p>
        </div>
        <form>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="E-mail válido">
            </div>

            <div class="mb-3">
                <label for="phone" class="form-label">Número de Telefone</label>
                <input type="tel" class="form-control" id="phone" placeholder="Aguarde pra ligarmos">
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Senha</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="password" placeholder="Uma senha forte">
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                        <i data-feather="eye"></i>
                    </button>
                </div>
            </div>

            <div class="mb-3">
                <small class="text-muted">
                    Ao marcar a caixa você concorda com nossos <a href="https://policies.google.com/terms?hl=pt-BR" class="text-decoration-none">Termos e
                        Condições</a>
                </small>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3">Próximo</button>

            <button type="button"
                class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2">
                <img src="https://www.gstatic.com/marketing-cms/assets/images/d5/dc/cfe9ce8b4425b410b49b7f2dd3f3/g.webp=s48-fcrop64=1,00000000ffffffff-rw" alt="Google" width="20" height="20">
                <span>Ou faça login com o Google</span>
            </button>
        </form>

        <div class="text-center mt-4">
            <small class="text-muted">© Matheus Assunção 2025</small>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script>
        feather.replace();

        document.getElementById('togglePassword').addEventListener('click', function () {
            const password = document.getElementById('password');
            if (password.type === 'password') {
                password.type = 'text';
                this.innerHTML = '<i data-feather="eye"></i>';
            } else {
                password.type = 'password';
                this.innerHTML = '<i data-feather="eye-off"></i>';
            }
            feather.replace();
        });

         // Lógica para o botão "Ou faça login com o Google"
    const googleBtn = document.querySelector('.btn.btn-outline-secondary.w-100.d-flex');
    googleBtn.addEventListener('click', function () {
        alert('Redirecionando para login com o Google...');
        // Abre a página de login do Google
        window.location.href = 'https://accounts.google.com/signin';
    });

    // Lógica para o formulário (botão "Próximo")
    const form = document.querySelector('form');
    form.addEventListener('submit', function(event) {
        event.preventDefault(); // Evita o envio padrão do formulário

        // Coleta os valores dos campos
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value.trim();

        // Verifica se todos os campos foram preenchidos
        if (email === '' || phone === '' || password === '') {
            alert('Preencha todos os campos!');
            return;
        }

        alert('Cadastrado e logado com sucesso!');
        // Redireciona para o dashboard
        window.location.href = './dashboard.html';
    });
    </script>
</body>

</html>
