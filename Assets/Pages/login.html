<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ChegaBus Login</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
    <style>
        .bg-cover {
            background-size: cover;
            background-position: center;
        }
        .input-group-text {
            transition: transform 0.3s ease, color 0.3s ease;
        }
        .form-control:focus + .input-group-append .input-group-text {
            transform: scale(1.2);
            color: #007bff;
        }
        .google-logo {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container-fluid min-vh-100 d-flex">
        <!-- Left Side Image -->
        <div class="d-none d-lg-block col-lg-6 p-0">
            <img src="https://storage.googleapis.com/a1aa/image/JYcfXBSwqv0ujHJ9MabXHntwYxtNkTSWRJEJaTzrm5M.jpg" alt="A modern bus parked in front of a contemporary building at night" class="w-100 h-100 bg-cover">
        </div>
        <!-- Right Side Form -->
        <div class="col-lg-6 d-flex flex-column justify-content-center align-items-center bg-white p-4">
            <div class="w-100" style="max-width: 400px;">
                <div class="text-center mb-4">
                    <img src="https://storage.googleapis.com/a1aa/image/n-up2OlHyr2JY0fGsGp7UDGqVA21xDRRCsCvXDKoqNc.jpg" alt="ChegaBus logo" class="img-fluid" style="width: 100px; height: 100px;">
                </div>
                <h2 class="text-center mb-4">Que bom ver você de novo</h2>
                <form>
                    <div class="form-group">
                        <label for="email">Login</label>
                        <input type="email" class="form-control" id="email" placeholder="E-mail ou número de telefone">
                    </div>
                    <div class="form-group">
                        <label for="password">Senha</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="password" placeholder="Digite a senha">
                            <div class="input-group-append">
                                <span class="input-group-text"><i class="fas fa-eye"></i></span>
                            </div>
                        </div>
                    </div>
                    <div class="form-group form-check d-flex justify-content-between">
                        <div>
                            <input type="checkbox" class="form-check-input" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">Lembre de mim</label>
                        </div>
                        <a href="#" class="text-primary">Esqueceu sua senha?</a>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Entrar</button>
                    <div class="d-flex align-items-center my-3">
                        <hr class="flex-grow-1">
                        <span class="px-2 text-muted">ou</span>
                        <hr class="flex-grow-1">
                    </div>
                    <button type="button" class="btn btn-dark btn-block d-flex align-items-center justify-content-center">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google G logo" class="google-logo mr-2"> Ou faça login com o Google
                    </button>
                </form>
                <div class="text-center mt-4">
                    <p class="text-muted">Não tem uma conta? <a href="#" class="text-primary">Inscreva-se agora</a></p>
                </div>
                <div class="text-center mt-4">
                    <p class="text-muted">© Matheus Assunção 2025</p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
