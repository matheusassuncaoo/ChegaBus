<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ChegaBus Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
    <div class="container-fluid d-flex min-vh-100">
        <!-- Left Side Image -->
        <div class="d-none d-lg-block col-lg-6 p-0">
            <img src="https://storage.googleapis.com/a1aa/image/JYcfXBSwqv0ujHJ9MabXHntwYxtNkTSWRJEJaTzrm5M.jpg" 
                 alt="A modern bus parked in front of a contemporary building at night" 
                 class="w-100 h-100 object-fit-cover">
        </div>
        <!-- Right Side Form -->
        <div class="col-lg-6 d-flex flex-column justify-content-center align-items-center bg-white p-4">
            <div class="w-100" style="max-width: 400px;">
                <div class="text-center mb-4">
                    <img src="../images/Logo_Blue.png" alt="ChegaBus logo" class="img-fluid" style="width: 96px; height: 116px;">
                </div>
                <h2 class="text-center mb-4">Que bom ver você de novo</h2>
                <form class="fakeLoginForm">
                    <div class="mb-3">
                        <label for="email" class="form-label">Login</label>
                        <input type="text" class="form-control" id="email" placeholder="E-mail ou número de telefone">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Senha</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="password" placeholder="Digite a senha">
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                <i data-feather="eye" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">Lembre de mim</label>
                        </div>
                        <a href="#" class="text-primary">Esqueceu sua senha?</a>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">Entrar</button>
                    <button type="button" class="loginButton btn btn-dark w-100 d-flex align-items-center justify-content-center">
                        <img src="https://www.gstatic.com/marketing-cms/assets/images/d5/dc/cfe9ce8b4425b410b49b7f2dd3f3/g.webp=s48-fcrop64=1,00000000ffffffff-rw" 
                             alt="Google G logo" class="me-2" width="20px" height="20px"> 
                        Ou faça login com o Google
                    </button>
                </form>
                <div class="text-center mt-4">
                    <p class="text-muted">Não tem uma conta? <a href="#" class="text-primary">Inscreva-se agora</a></p>
                </div>
                <div class="text-center mt-4">
                    <p class="text-muted">© Matheus Assunção 2025</p>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>feather.replace();</script>
    <script src="../js/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
</body>
</html>
